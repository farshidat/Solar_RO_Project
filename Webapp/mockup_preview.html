<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پیش‌نمایش ظاهری - سیستم تصفیه آب خورشیدی</title>
<style>
  :root {
    --bg: #eef5f7;
    --card-bg: #ffffff;
    --primary: #0f7fa0;
    --primary-dark: #0a5f79;
    --text: #1c2b33;
    --muted: #8a9aa2;
    --zone-green: #4caf50;
    --zone-yellow: #f4c430;
    --zone-red: #e5484d;
    --shadow: 0 4px 14px rgba(15, 60, 75, 0.08);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Tahoma, "Segoe UI", Arial, sans-serif;
    background: #d8d8d8;
    display: flex;
    justify-content: center;
    padding: 20px 0;
  }

  .phone {
    width: 360px;
    height: 720px;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    color: var(--text);
  }

  header {
    padding: 10px 16px 6px;
    text-align: center;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 13px;
    margin: 0;
    color: var(--primary-dark);
    font-weight: bold;
  }

  main {
    flex: 1;
    padding: 6px 14px 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow: hidden;
  }

  .card {
    background: var(--card-bg);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 10px;
    text-align: center;
  }

  .card.disabled {
    opacity: 0.45;
    filter: grayscale(60%);
  }

  .row {
    display: flex;
    gap: 10px;
  }
  .row .card {
    flex: 1;
    padding: 8px;
  }

  .card-title {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 2px;
  }

  .card-value {
    font-size: 24px;
    font-weight: bold;
    color: var(--primary-dark);
  }
  .row .card-value {
    font-size: 17px;
  }
  .card-value .unit {
    font-size: 12px;
    font-weight: normal;
    color: var(--muted);
    margin-right: 3px;
  }

  .gauge-note {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .disabled-badge {
    display: inline-block;
    margin-top: 4px;
    font-size: 9px;
    background: #eceff1;
    color: #78909c;
    padding: 1px 8px;
    border-radius: 10px;
  }

  .alert-box {
    background: #e8f8ec;
    border: 1px solid #b6e6bf;
    border-radius: 14px;
    padding: 8px 12px;
    min-height: 62px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
  }
  .alert-line {
    font-size: 11px;
    color: #2e7d32;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .alert-line.warn { color: #8a6d00; }
  .alert-line.critical { color: #b3261e; }

  nav.bottom-nav {
    display: flex;
    justify-content: space-around;
    background: var(--card-bg);
    border-top: 1px solid #e2ecef;
    padding: 6px 0 10px;
    flex-shrink: 0;
  }

  nav.bottom-nav .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    font-size: 9px;
    color: var(--muted);
    flex: 1;
  }

  nav.bottom-nav .nav-item.active {
    color: var(--primary);
    font-weight: bold;
  }

  nav.bottom-nav .nav-icon {
    width: 20px;
    height: 20px;
  }
  nav.bottom-nav .nav-icon svg {
    width: 100%;
    height: 100%;
    stroke: currentColor;
    fill: none;
  }
</style>
</head>
<body>
<div class="phone">

  <header>
    <h1>سیستم تصفیه آب خورشیدی</h1>
  </header>

  <main>

    <!-- گیج بزرگ بالا: TDS خروجی -->
    <div class="card">
      <div class="card-title">TDS خروجی</div>
      <svg id="gauge-main" width="170" height="102" viewBox="0 0 200 120"></svg>
      <div class="card-value" id="gauge-main-value">128 <span class="unit">ppm</span></div>
      <div class="gauge-note">وضعیت مطلوب</div>
    </div>

    <!-- ردیف دو گیج نصف‌اندازه -->
    <div class="row">
      <div class="card">
        <div class="card-title">TDS ورودی</div>
        <svg id="gauge-inlet" width="110" height="66" viewBox="0 0 200 120"></svg>
        <div class="card-value">640 <span class="unit">ppm</span></div>
      </div>

      <div class="card disabled">
        <div class="card-title">شارژ باتری</div>
        <svg id="gauge-battery" width="110" height="66" viewBox="0 0 200 120"></svg>
        <div class="card-value">-- <span class="unit">%</span></div>
        <span class="disabled-badge">هنوز پیاده‌سازی نشده</span>
      </div>
    </div>

    <!-- باکس اعلانات: جا برای ۳ خط -->
    <div class="alert-box">
      <div class="alert-line">✅ همه پارامترها در وضعیت عادی</div>
      <div class="alert-line warn" style="visibility:hidden">—</div>
      <div class="alert-line critical" style="visibility:hidden">—</div>
    </div>

  </main>

  <nav class="bottom-nav">
    <div class="nav-item active">
      <div class="nav-icon" data-icon="home"></div>
      خانه
    </div>
    <div class="nav-item">
      <div class="nav-icon" data-icon="performance"></div>
      عملکرد
    </div>
    <div class="nav-item">
      <div class="nav-icon" data-icon="settings"></div>
      تنظیمات
    </div>
    <div class="nav-item">
      <div class="nav-icon" data-icon="alerts"></div>
      هشدارها
    </div>
  </nav>

</div>

<script>
// آیکون‌های ساده SVG دستی (بدون کتابخانه)، هرکدام viewBox 24x24
const ICONS = {
  home: '<path d="M4 11 12 4l8 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 10v9h5v-5h2v5h5v-9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>',
  performance: '<path d="M4 17a8 8 0 0 1 16 0" stroke-width="2" stroke-linecap="round"/><path d="M12 17 16 10" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="17" r="1.6" stroke-width="2"/>',
  settings: '<path d="M4 7h10M17 7h3M4 12h3M8 12h12M4 17h10M17 17h3" stroke-width="2" stroke-linecap="round"/><circle cx="16" cy="7" r="2" stroke-width="2"/><circle cx="6" cy="12" r="2" stroke-width="2"/><circle cx="14" cy="17" r="2" stroke-width="2"/>',
  alerts: '<path d="M12 3a5 5 0 0 0-5 5v3.2c0 .5-.2 1-.5 1.4L4.8 15H19.2l-1.7-2.4c-.3-.4-.5-.9-.5-1.4V8a5 5 0 0 0-5-5Z" stroke-width="2" stroke-linejoin="round"/><path d="M9.5 18.5a2.5 2.5 0 0 0 5 0" stroke-width="2" stroke-linecap="round"/>'
};
document.querySelectorAll('.nav-icon').forEach(el => {
  el.innerHTML = `<svg viewBox="0 0 24 24">${ICONS[el.dataset.icon]}</svg>`;
});

// گیج دایره‌ای دستی با SVG. سوئیپ 270 درجه: از -135 تا +135.
// سه ناحیه رنگی: سبز(مطلوب) / زرد(هشدار) / قرمز(خارج از رنج مطلوب).
// آستانه‌های t1 و t2 فعلاً نمونه‌اند؛ برای هر پارامتر بعداً از کاربر پرسیده می‌شود.
function buildGauge(svgEl, value, min, max, t1, t2, invertColors) {
  const cx = 100, cy = 100, r = 78;
  const startAngle = -135, endAngle = 135;

  function angleForValue(v) {
    const t = (v - min) / (max - min);
    return startAngle + t * (endAngle - startAngle);
  }
  function polar(angleDeg, radius) {
    const a = (angleDeg - 90) * Math.PI / 180;
    return { x: cx + radius * Math.cos(a), y: cy + radius * Math.sin(a) };
  }
  function arcPath(a1, a2, radius) {
    const p1 = polar(a1, radius);
    const p2 = polar(a2, radius);
    const largeArc = (a2 - a1) > 180 ? 1 : 0;
    return `M ${p1.x} ${p1.y} A ${radius} ${radius} 0 ${largeArc} 1 ${p2.x} ${p2.y}`;
  }

  // ترتیب رنگ‌ها بسته به این‌که برای این پارامتر «کم بودن بد است» (مثل شارژ باتری)
  // یا «زیاد بودن بد است» (مثل TDS) معکوس می‌شود.
  const lowColor = invertColors ? 'var(--zone-red)' : 'var(--zone-green)';
  const highColor = invertColors ? 'var(--zone-green)' : 'var(--zone-red)';
  const zones = [
    { from: min, to: t1, color: lowColor },
    { from: t1,  to: t2, color: 'var(--zone-yellow)' },
    { from: t2,  to: max, color: highColor },
  ];

  let svg = `<g>`;
  zones.forEach(zone => {
    svg += `<path d="${arcPath(angleForValue(zone.from), angleForValue(zone.to), r)}" stroke="${zone.color}" stroke-width="14" fill="none"/>`;
  });

  for (let v = min; v <= max; v += (max - min) / 10) {
    const a = angleForValue(v);
    const p1 = polar(a, r + 12);
    const p2 = polar(a, r + 20);
    svg += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="#9aa9af" stroke-width="2"/>`;
  }

  const needleAngle = angleForValue(Math.max(min, Math.min(max, value)));
  const tip = polar(needleAngle, r - 8);
  svg += `<line x1="${cx}" y1="${cy}" x2="${tip.x}" y2="${tip.y}" stroke="#1c2b33" stroke-width="4" stroke-linecap="round"/>`;
  svg += `<circle cx="${cx}" cy="${cy}" r="7" fill="#1c2b33"/>`;
  svg += `</g>`;
  svgEl.innerHTML = svg;
}

buildGauge(document.getElementById('gauge-main'), 42, 0, 100, 55, 80, false);
buildGauge(document.getElementById('gauge-inlet'), 64, 0, 100, 55, 80, false);
buildGauge(document.getElementById('gauge-battery'), 72, 0, 100, 15, 30, true);
</script>

</body>
</html>
